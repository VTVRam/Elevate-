<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevate | The Student Achievement OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-body: #fbfcfd;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #f1f5f9;
            --radius: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100vh; overflow: hidden; }

        .app-layout { display: flex; height: 100vh; width: 100vw; }

        
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .brand-logo { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }
        .brand-name { font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }

        .nav-group { flex: 1; }
        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 10px 12px;
            text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 500;
            border-radius: 8px; margin-bottom: 4px; transition: 0.2s;
        }
        .nav-link:hover { background: #f8fafc; color: var(--primary); }
        .nav-link.active { background: #eef2ff; color: var(--primary); }

  
        .main-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .topbar {
            height: 72px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(251, 252, 253, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;
        }
        .search-box {
            background: #f1f5f9; border-radius: 10px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; width: 300px;
        }
        .search-box input { border: none; background: transparent; outline: none; font-size: 14px; width: 100%; }

        .user-pill { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .user-pill img { width: 36px; height: 36px; border-radius: 10px; object-fit: cover; }

        
        .content-view { padding: 40px; max-width: 1100px; margin: 0 auto; width: 100%; }
        .page-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -1px; }
        .page-desc { color: var(--text-muted); margin-bottom: 32px; }

      
        .stats-row { display: grid; grid-template-cols: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .stat-card span { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .stat-card h4 { font-size: 24px; margin-top: 8px; }

        
        .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; margin-bottom: 24px; }
        .event-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 24px; }
        .event-card { border-radius: 16px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; background: white; }
        .event-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .event-img { height: 200px; background: #f1f5f9; width: 100%; object-fit: cover; }
        .event-info { padding: 20px; }
        .tag { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--primary); background: #eef2ff; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 12px; }
        
        
        .lb-table { width: 100%; border-collapse: collapse; }
        .lb-table th { text-align: left; padding: 12px; color: var(--text-muted); font-size: 12px; border-bottom: 1px solid var(--border); }
        .lb-table td { padding: 16px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .rank-badge { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: #f1f5f9; font-weight: 700; font-size: 12px; }

    
        .profile-header { background: linear-gradient(135deg, #6366f1, #a855f7); height: 160px; border-radius: 16px; margin-bottom: 60px; position: relative; }
        .avatar-large { width: 100px; height: 100px; border-radius: 24px; border: 4px solid white; position: absolute; bottom: -40px; left: 32px; background: #eee; }
        
        
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-layout">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo"><i data-lucide="layers"></i></div>
            <span class="brand-name">Elevate</span>
        </div>
        <nav class="nav-group">
            <a href="#" class="nav-link active" onclick="showView('dashboard', this)"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="#" class="nav-link" onclick="showView('events', this)"><i data-lucide="calendar"></i> Discovery</a>
            <a href="#" class="nav-link" onclick="showView('leaderboard', this)"><i data-lucide="bar-chart"></i> Leaderboard</a>
            <a href="#" class="nav-link" onclick="showView('profile', this)"><i data-lucide="user"></i> My Profile</a>
        </nav>
        <div class="nav-link" style="margin-top: auto; color: #ef4444;"><i data-lucide="log-out"></i> Sign Out</div>
    </aside>

    <div class="main-container">
        <header class="topbar">
            <div class="search-box">
                <i data-lucide="search" size="18"></i>
                <input type="text" placeholder="Search events or students...">
            </div>
            <div class="user-pill" onclick="showView('profile')">
                <span style="font-size: 14px; font-weight: 600;">Alex Rivers</span>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex" alt="User">
            </div>
        </header>

        <main id="main-view" class="content-view fade-in">
            </main>
    </div>
</div>

<script>
    lucide.createIcons();

    const views = {
        dashboard: `
            <h1 class="page-title">Morning, Alex</h1>
            <p class="page-desc">Here's your verification summary and upcoming events.</p>
            <div class="stats-row">
                <div class="stat-card"><span>Verified Rank</span><h4>Platinum III</h4></div>
                <div class="stat-card"><span>Total Credits</span><h4>2,450</h4></div>
                <div class="stat-card"><span>Global Percentile</span><h4>Top 2%</h4></div>
                <div class="stat-card"><span>Upcoming Events</span><h4>3</h4></div>
            </div>
            <h3 style="margin-bottom: 20px;">Trending Near You</h3>
            <div class="event-grid">
                <div class="event-card">
                    <img class="event-img" src="https://images.unsplash.com/photo-1540575861501-7ce0e220abb7?auto=format&fit=crop&q=80&w=800">
                    <div class="event-info">
                        <span class="tag">Hackathon</span>
                        <h4>Global AI Summit 2026</h4>
                        <p style="color: var(--text-muted); font-size: 14px; margin: 8px 0 16px;">Stanford University • Mar 28 - 30</p>
                        <button class="btn btn-primary">Register Now</button>
                    </div>
                </div>
                <div class="event-card">
                    <img class="event-img" src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&q=80&w=800">
                    <div class="event-info">
                        <span class="tag">Workshop</span>
                        <h4>UI/UX Masterclass</h4>
                        <p style="color: var(--text-muted); font-size: 14px; margin: 8px 0 16px;">Virtual Session • Mar 31</p>
                        <button class="btn btn-primary" style="background: #f1f5f9; color: black;">Save Spot</button>
                    </div>
                </div>
            </div>
        `,
        events: `
            <h1 class="page-title">Discovery</h1>
            <p class="page-desc">Explore verified events across the globe.</p>
            <div class="card" style="display:flex; gap: 10px;">
                <button class="btn btn-primary">All Types</button>
                <button class="btn" style="background:#f1f5f9">Hackathons</button>
                <button class="btn" style="background:#f1f5f9">Workshops</button>
                <button class="btn" style="background:#f1f5f9">Webinars</button>
            </div>
            <div class="event-grid">
                <div class="event-card">
                    <img class="event-img" src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&q=80&w=800">
                    <div class="event-info">
                        <span class="tag">Networking</span>
                        <h4>DevRel Meetup 2026</h4>
                        <p style="color: var(--text-muted); font-size: 14px; margin: 8px 0 16px;">San Francisco, CA</p>
                        <button class="btn btn-primary">Interested</button>
                    </div>
                </div>
            </div>
        `,
        leaderboard: `
            <h1 class="page-title">Leaderboard</h1>
            <p class="page-desc">Top performers in the Elevate ecosystem.</p>
            <div class="card">
                <table class="lb-table">
                    <thead>
                        <tr><th>Rank</th><th>Student</th><th>Credits</th><th>Status</th></tr>
                    </thead>
                    <tbody>
                        <tr><td><div class="rank-badge" style="background:#fef3c7; color:#92400e">1</div></td><td><b>Sarah Jenkins</b></td><td>4,920</td><td><span class="tag" style="background:#dcfce7; color:#166534">Verified</span></td></tr>
                        <tr><td><div class="rank-badge">2</div></td><td><b>Michael Chen</b></td><td>4,100</td><td><span class="tag" style="background:#dcfce7; color:#166534">Verified</span></td></tr>
                        <tr style="background: #f8fafc;"><td><div class="rank-badge" style="background:var(--primary); color:white">128</div></td><td><b>Alex Rivers (You)</b></td><td>2,450</td><td><span class="tag">Pro</span></td></tr>
                    </tbody>
                </table>
            </div>
        `,
        profile: `
            <div class="profile-header">
                <img class="avatar-large" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex">
            </div>
            <div style="padding-left: 10px; margin-bottom: 30px;">
                <h1 class="page-title">Alex Rivers</h1>
                <p class="page-desc">Full-Stack Developer & Community Builder</p>
                <div style="display:flex; gap: 8px; margin-top: -20px;">
                    <span class="tag">React</span><span class="tag">TypeScript</span><span class="tag">Node.js</span>
                </div>
            </div>
            <div class="event-grid">
                <div class="card">
                    <h3>Achievements</h3>
                    <ul style="margin-top: 15px; list-style: none; font-size: 14px; color: var(--text-muted);">
                        <li style="margin-bottom: 10px;">🏆 Winner - EthGlobal 2025</li>
                        <li style="margin-bottom: 10px;">🌟 Open Source Contributor</li>
                    </ul>
                </div>
                <div class="card">
                    <h3>Activity Log</h3>
                    <p style="font-size: 13px; color: var(--text-muted);">Joined "Global AI Summit" yesterday.</p>
                </div>
            </div>
        `
    };

    function showView(viewKey, element) {
        const main = document.getElementById('main-view');
        
    
        if(element) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            element.classList.add('active');
        }

    
        main.style.opacity = '0';
        setTimeout(() => {
            main.innerHTML = views[viewKey];
            main.style.opacity = '1';
            lucide.createIcons();
        }, 150);
    }

  
    showView('dashboard');

</script>
</body>
</html>
